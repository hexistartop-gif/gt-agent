<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GT Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
          processEscapes: true,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
        startup: {
          ready: () => {
            MathJax.startup.defaultReady();
            document.dispatchEvent(new CustomEvent("mathjax-ready"));
          },
        },
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">GT</div>
          <div>
            <h1>GT Agent</h1>
            <p>Geometry & Topology Research</p>
          </div>
        </div>

        <section class="chat-panel" aria-labelledby="chatsTitle">
          <div class="chat-panel-header">
            <h2 id="chatsTitle">Conversations</h2>
            <button id="newChatBtn" type="button" title="New conversation">New</button>
          </div>
          <div class="chat-actions">
            <button id="renameChatBtn" type="button">Rename</button>
            <button id="deleteChatBtn" type="button">Delete</button>
          </div>
          <div id="chatList" class="chat-list"></div>
        </section>

        <section class="panel">
          <label>
            Provider URL
            <input id="baseUrl" value="https://api.openai.com/v1" autocomplete="off" />
          </label>
          <label>
            Model
            <input id="model" value="gpt-4.1" autocomplete="off" />
          </label>
          <label>
            API Key
            <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
          </label>
          <label>
            Temperature
            <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.2" />
          </label>
          <label>
            Max Tokens
            <input id="maxTokens" type="number" min="512" step="512" value="8192" />
          </label>
        </section>

        <section class="tools-panel" aria-labelledby="toolsTitle">
          <div class="tools-panel-header">
            <h2 id="toolsTitle">Tools</h2>
            <span id="toolsStatus">Loading</span>
          </div>
          <div class="tool-actions">
            <button id="enableAllToolsBtn" type="button">All On</button>
            <button id="disableAllToolsBtn" type="button">All Off</button>
            <button id="resetToolsBtn" type="button">Reset</button>
          </div>
          <div id="toolsList" class="tools-list"></div>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h2 id="activeChatTitle">Research Console</h2>
            <p>Geometry/topology workspace</p>
          </div>
          <div class="topbar-actions">
            <select id="exportFormat" aria-label="Export format">
              <option value="markdown">Markdown</option>
              <option value="pdf">PDF</option>
              <option value="json">JSON</option>
            </select>
            <button id="exportBtn" type="button">Export</button>
            <button id="runBtn" type="button">Run</button>
          </div>
        </header>

        <section class="conversation" id="conversation">
          <article class="message assistant">
            <div class="avatar">GT</div>
            <div class="bubble">
              <strong>Ready.</strong>
              <p>State a problem with its definitions, hypotheses, and allowed references.</p>
            </div>
          </article>
        </section>

        <section class="composer">
          <label class="context-label">
            Domain Context
            <textarea id="context" rows="4" placeholder="smooth manifolds, compact oriented closed, allowed references..."></textarea>
          </label>
          <label class="problem-label">
            Problem
            <textarea id="problem" rows="8" placeholder="Problem statement..."></textarea>
          </label>
          <div class="composer-actions">
            <span id="statusText">Idle</span>
            <button id="sendBtn" type="button">Send</button>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
